<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YX-LASER | Professional Laser Machine Manufacturer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        /* 导航栏 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        nav a {
            color: #fff;
            margin: 0 1rem;
            text-decoration: none;
        }
        nav a:hover {
            color: #00a8ff;
        }
        /* 带激光切割背景图的首页横幅 */
        .banner {
            width: 100vw;
            height: 100vh;
            /* 这里就是背景图代码，和你仓库里的图片名100%匹配 */
            background: url('laser-cutting-bg.jpg') center center / cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
        }
        /* 半透明遮罩，让文字更清晰 */
        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .banner-content {
            position: relative;
            z-index: 1;
            padding: 0 20px;
        }
        .banner h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .banner p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 700px;
            margin: 0 auto 2rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">YX-LASER</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="about.html">About Us</a>
            <a href="applications.html">Applications</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="banner">
        <div class="banner-content">
            <h1>YX-LASER | Professional Laser Machine Manufacturer</h1>
            <p>High-precision laser cutting, engraving and marking machines for textile, leather, label and other industries</p>
            <a href="products.html" class="btn">View Our Products</a>
        </div>
    </section>
</body>
</html>
